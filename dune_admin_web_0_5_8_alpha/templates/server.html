{% extends "base.html" %}
{% block title %}Server Management{% endblock %}

{% block content %}
<h1>Server Management</h1>

<div id="actionOutput" class="msg" style="display:none;"></div>

<div class="grid">

<div class="box">
<h2>Map Spawner</h2>

{% for map_name in maps %}
<form class="ajaxForm" data-endpoint="/api/spawn-map">
    <input type="hidden" name="map_name" value="{{ map_name }}">
    <button type="submit">Spawn {{ map_name }}</button>
</form>
{% endfor %}
</div>

<div class="box">
<h2>Restart Services</h2>

{% for target in restart_targets %}
<form class="ajaxForm" data-endpoint="/api/restart-target">
    <input type="hidden" name="target" value="{{ target }}">
    <button type="submit">Restart {{ target }}</button>
</form>
{% endfor %}
</div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/dune-admin.js"></script>
<script>
wireAjaxForms();
</script>
{% endblock %}
