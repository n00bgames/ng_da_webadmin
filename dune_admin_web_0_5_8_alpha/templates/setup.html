{% extends "base.html" %}
{% block title %}First Run Setup{% endblock %}

{% block content %}
<div class="box">
<h1>First Run Setup</h1>
<p>Create the first administrator account. No default admin account is created.</p>

<form method="post">
    <input name="username" placeholder="Admin username">
    <input type="password" name="password" placeholder="Admin password">
    <button>Create Admin</button>
</form>
</div>
{% endblock %}
